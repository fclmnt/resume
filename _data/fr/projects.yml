  - name: Portable North Pole (PNP)
    link: https://www.portablenorthpole.com/en
    client: UGroupMedia
    platform: iOS & tvOS
    platform-icon: 📱
    quote: >
      L'application de Noël n°1 de l'App Store : vidéos personnalisées et expériences IA en temps réel pour 6M d'utilisateurs, note de 4,8.
    description: | # this will include new lines to allow paragraphs
      Je dirige le développement iOS de PNP : je suis responsable du client Swift de bout en bout, ainsi que des contrats gRPC et des services LLM Python derrière ses fonctionnalités les plus récentes.

      **IA temps réel et générative**
      • Livraison de **Talk to Santa**, une expérience vocale en direct sur l'**API Realtime d'OpenAI** : audio en streaming, contexte multi-tours, et suivi de la consommation de tokens reporté par conversation pour le contrôle des coûts
      • Conception et mise en production de l'**agent de support IA intégré** : un pipeline **RAG** avec ingénierie de prompts système, évaluation par **LLM-juge** et réponses multilingues adaptées par zone, désormais en ligne sur iOS, web et Android
      • Évaluation et benchmark de services IA sur toute la stack (Python) : TTS (**ElevenLabs vs Azure**, clonage de voix), génération d'histoires/d'appels avec harnais d'évaluation de contenu, et pré-filtres de modération

      **Plateforme et qualité iOS**
      • Migration de l'application vers la **concurrence stricte de Swift 6**, résolution de crashs du compilateur (SIL inliner), et support d'**iOS 26**
      • Migration de la couche réseau de **grpc-swift v1 à v2** et du **pnp-swift-sdk** partagé ; décomposition des services gRPC monolithiques en services métier avec clés d'idempotence et contrat d'erreur partagé
      • Ingénierie de la plateforme d'**abonnement** (OAuth multi-fournisseurs, authentification sans mot de passe, restauration automatique des achats) ainsi qu'un flux de **rétention au renouvellement** avant l'annulation native
      • Traitement audio/vidéo, streaming et lecture temps réel via **FFmpeg** sur iOS/tvOS
      • Analytics respectueuses de la confidentialité avec masquage des données et conformité GDPR

      **Reconnaissance et portée**
      • **App de Noël n°1** sur l'App Store, note **4,8**, **6M+** d'utilisateurs
      • Mise en avant par **TODAY Show, New York Times, Fox News, BuzzFeed**
      • **314M+** vidéos personnalisées créées depuis 2008
      • **App of the Day** au Mexique, en France, aux États-Unis et au Canada

