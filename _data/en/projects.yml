  - name: Portable North Pole (PNP)
    link: https://www.portablenorthpole.com/en
    client: UGroupMedia
    platform: iOS & tvOS
    platform-icon: 📱
    quote: >
      The App Store's #1 Santa app: personalized video and real-time AI experiences for 6M users, 4.8 rating.
    description: | # this will include new lines to allow paragraphs
      I lead iOS for PNP, owning the Swift client end to end and the gRPC contracts and Python LLM services behind its newest features.

      **Real-time & generative AI**
      • Shipped **Talk to Santa**, a live voice experience on **OpenAI's Realtime API**: streamed audio, multi-turn context, and token-accurate usage reported per conversation for cost control
      • Built and shipped the **in-app AI support agent** to production: a **RAG** pipeline with system-prompt engineering, **LLM-as-judge** scoring, and multilingual, zone-aware responses, now live across iOS, web, and Android
      • Evaluated and benchmarked AI services across the stack (Python): TTS (**ElevenLabs vs Azure**, voice cloning), story/call generation with content-evaluation harnesses, and content moderation pre-filters

      **iOS platform & quality**
      • Migrated the app to **Swift 6 strict concurrency**, resolving compiler (SIL inliner) crashes, and shipped **iOS 26** support
      • Migrated the networking layer from **grpc-swift v1 to v2** and the shared **pnp-swift-sdk**; decomposed monolithic gRPC services into domain-specific ones with idempotency keys and a shared error contract
      • Engineered the **subscription** platform (multi-provider OAuth, passwordless auth, automatic purchase restoration) plus an **auto-renewal retention** flow before native cancellation
      • **FFmpeg**-based audio/video processing, streaming, and real-time playback across iOS/tvOS
      • Privacy-compliant analytics with data masking and GDPR compliance

      **Recognition & reach**
      • **#1 Santa App** on the App Store, **4.8** rating, **6M+** users
      • Featured by **TODAY Show, New York Times, Fox News, BuzzFeed**
      • **314M+** personalized videos created since 2008
      • **App of the Day** in Mexico, France, United States, and Canada

