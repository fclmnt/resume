# About Template
title : Profil
content : |
  Je conçois des applications iOS depuis 12 ans, les six dernières sur Portable North Pole, l'application de Noël n°1 de l'App Store, avec 6M d'utilisateurs et une note de 4,8. Cette année, j'ai livré Talk to Santa, une expérience vocale en temps réel bâtie sur l'API Realtime d'OpenAI, et développé l'agent de support RAG qui répond désormais aux utilisateurs dans l'application, sur iOS, web et Android.

